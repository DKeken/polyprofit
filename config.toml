chain_id = 137

[strategy]
min_edge = "0.05"
min_prob = "0.15"
max_prob = "0.85"
max_spread = "0.06"
order_strategy = "Passive"
market_refresh_secs = 60
assets = ["BTC", "ETH", "SOL", "XRP"]

[risk]
daily_loss_limit = "-100"
daily_profit_cap = "100000"
max_position_pct = "0.05"
max_concurrent = 50
drawdown_limit = "0.20"
adverse_fill_pause = 3
starting_balance = "1000"

[server]
port = 3000
frontend_dist = "frontend/dist"

[whales]
min_trade_usd = "200"
min_win_rate = 0.55
min_roi = 0.15
min_profit_usd = "500"
poll_interval_secs = 300

# ── Asset Definitions ──
# Each [[asset_definitions]] block maps a symbol to its Binance pair and
# discovery keywords. To add a new asset (e.g. DOGE), just add a new block
# here and include "DOGE" in strategy.assets above. Zero code changes needed.

[[asset_definitions]]
symbol = "BTC"
binance_symbol = "BTCUSDT"
keywords = ["btc", "bitcoin"]

[[asset_definitions]]
symbol = "ETH"
binance_symbol = "ETHUSDT"
keywords = ["eth", "ethereum"]

[[asset_definitions]]
symbol = "SOL"
binance_symbol = "SOLUSDT"
keywords = ["sol", "solana"]

[[asset_definitions]]
symbol = "XRP"
binance_symbol = "XRPUSDT"
keywords = ["xrp", "ripple"]
